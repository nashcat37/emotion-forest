<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Emotion Forest 情緒森林</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="stage">
    <div id="app">
      <!-- 所有 Scene 由 SceneManager 動態插入這裡 -->
    </div>
  </div>

  <!-- 啟動門檻：僅為取得瀏覽器允許影片有聲播放所需的使用者手勢，非世界觀的一部分 -->
  <div class="start-gate" id="startGate">
    <div class="start-gate__hint" id="startGateHint"></div>
    <button class="start-gate__btn" id="startBtn">進入森林</button>
  </div>

  <!-- 開發測試面板，正式上線前會整個移除 -->
  <div class="dev-panel" id="devPanel">
    <div>state: <span class="dev-panel__state" id="devState">-</span></div>
    <div id="devExtra"></div>
    <button id="devResetBtn">重置 isFirstEver</button>
    <label class="dev-panel__checkbox">
      <input type="checkbox" id="devBypassGate" /> 測試用：忽略時間限制
    </label>
    <button id="devSnowBtn">測試：下雪效果</button>
    <button id="devPetalBtn">測試：花瓣雨效果</button>
  </div>

  <!-- 共用工具 -->
  <script src="js/utils/typewriter.js"></script>

  <!-- Manager 模組 -->
  <script src="js/managers/memoryManager.js"></script>
  <script src="js/managers/gardenManager.js"></script>
  <script src="js/managers/diaryManager.js"></script>

  <!-- Scene 模組 -->
  <script src="js/scenes/fogScene.js"></script>
  <script src="js/scenes/mainHubScene.js"></script>
  <script src="js/scenes/seedPlantingScene.js"></script>

  <!-- Runtime Core -->
  <script src="js/sceneManager.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
